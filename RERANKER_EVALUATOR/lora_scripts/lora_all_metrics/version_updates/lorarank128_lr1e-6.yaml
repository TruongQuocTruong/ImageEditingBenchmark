### Model
model_name_or_path: MODELS/Qwen3-VL-Reranker-8B
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
additional_target: visual.merger 
freeze_vision_tower: false
freeze_multi_modal_projector: false 
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.1

### Dataset
dataset: qwen3_reranker_all # Check data path in LlamaFactory/data/dataset_info.json
template: qwen2_vl
cutoff_len: 8192 
overwrite_cache: false
preprocessing_num_workers: 1

### Output
output_dir: outputs/all_metrics_lorarank128_lr1e-6
logging_steps: 3
save_steps: 400
plot_loss: true
overwrite_output_dir: true

### Train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-6
num_train_epochs: 2.0
lr_scheduler_type: cosine
### Thay warmup_ratio bằng warmup_steps
warmup_steps: 300
bf16: true
flash_attn: sdpa

### Eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 400